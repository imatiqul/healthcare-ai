services:
  # ──────────────────────────────────────────────
  # PostgreSQL — one per bounded context
  # ──────────────────────────────────────────────
  postgres-voice:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: voice_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword123}
    volumes:
      - pgdata-voice:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d voice_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-network

  postgres-agent:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: agent_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword123}
    volumes:
      - pgdata-agent:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d agent_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-network

  postgres-fhir:
    image: postgres:16-alpine
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: fhir_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword123}
    volumes:
      - pgdata-fhir:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d fhir_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-network

  postgres-ocr:
    image: postgres:16-alpine
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: ocr_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword123}
    volumes:
      - pgdata-ocr:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ocr_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-network

  postgres-scheduling:
    image: postgres:16-alpine
    ports:
      - "5437:5432"
    environment:
      POSTGRES_DB: scheduling_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword123}
    volumes:
      - pgdata-scheduling:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d scheduling_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-network

  postgres-notification:
    image: postgres:16-alpine
    ports:
      - "5438:5432"
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword123}
    volumes:
      - pgdata-notification:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d notification_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-network

  postgres-pophealth:
    image: postgres:16-alpine
    ports:
      - "5439:5432"
    environment:
      POSTGRES_DB: pophealth_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword123}
    volumes:
      - pgdata-pophealth:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d pophealth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-network

  postgres-identity:
    image: postgres:16-alpine
    ports:
      - "5440:5432"
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword123}
    volumes:
      - pgdata-identity:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d identity_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-network

  # ──────────────────────────────────────────────
  # Redis
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-network

  # ──────────────────────────────────────────────
  # HAPI FHIR Server
  # ──────────────────────────────────────────────
  hapi-fhir:
    image: hapiproject/hapi:v7.2.0
    ports:
      - "8090:8080"
    environment:
      hapi.fhir.default_encoding: JSON
      hapi.fhir.allow_external_references: "true"
    networks:
      - healthcare-network

  # ──────────────────────────────────────────────
  # Qdrant — vector database
  # ──────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - healthcare-network

  # ──────────────────────────────────────────────
  # Azure Service Bus Emulator + SQL Server
  # ──────────────────────────────────────────────
  sql-servicebus:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${SA_PASSWORD:-ServiceBus!Dev123}"
    networks:
      - healthcare-network

  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    ports:
      - "5672:5672"
      - "5300:5300"
    environment:
      ACCEPT_EULA: "Y"
    depends_on:
      - sql-servicebus
    networks:
      - healthcare-network

  # ──────────────────────────────────────────────
  # Dapr placement service
  # ──────────────────────────────────────────────
  dapr-placement:
    image: daprio/dapr:1.14
    command: ["./placement", "--port", "50006"]
    ports:
      - "50006:50006"
    networks:
      - healthcare-network

  # ──────────────────────────────────────────────
  # Zipkin — distributed tracing
  # ──────────────────────────────────────────────
  zipkin:
    image: openzipkin/zipkin:3
    ports:
      - "9411:9411"
    networks:
      - healthcare-network

volumes:
  pgdata-voice:
  pgdata-agent:
  pgdata-fhir:
  pgdata-ocr:
  pgdata-scheduling:
  pgdata-notification:
  pgdata-pophealth:
  pgdata-identity:

networks:
  healthcare-network:
    name: healthcare-network
