name: Chromatic — Visual Regression

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/packages/design-system/**'
      - 'frontend/apps/**'
  push:
    branches: [main]
    paths:
      - 'frontend/packages/design-system/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  chromatic:
    runs-on: ubuntu-latest
    env:
      CHROMATIC_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Chromatic requires full git history for baseline comparison
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: '9'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build Storybook
        run: pnpm --filter @healthcare/design-system build-storybook
        working-directory: frontend

      - name: Publish to Chromatic
        if: env.CHROMATIC_TOKEN != ''
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: frontend/packages/design-system/storybook-static
          # Never fail CI on visual changes — auto-accept handles main branch baselines
          exitZeroOnChanges: true
          # Auto-accept changes on main (baseline update)
          autoAcceptChanges: main
          onlyChanged: true

      - name: Skip Chromatic (token not configured)
        if: env.CHROMATIC_TOKEN == ''
        run: |
          echo "::warning::CHROMATIC_PROJECT_TOKEN secret is not set — skipping visual regression upload."
          echo "Add the secret in GitHub → Settings → Secrets → Actions to enable Chromatic."
