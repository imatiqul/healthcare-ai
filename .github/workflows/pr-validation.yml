name: PR Validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write   # for Gitleaks SARIF upload

jobs:
  # ── Secret scanning: runs first so leaked credentials block the PR ─────────
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks PR scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          args: detect --source . --exit-code 1 --redact

  dotnet-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Format check
        run: dotnet format --verify-no-changes --no-restore

      - name: Unit tests with coverage
        run: |
          dotnet test tests/HealthQCopilot.Tests.Unit \
            --no-build --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Enforce 80% coverage threshold
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage/**/coverage.cobertura.xml
          badge: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: false
          indicators: true
          output: both
          thresholds: '80 90'
          fail_below_min: true

      - name: Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: '1'

  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: '9'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm lint
        working-directory: frontend
      - run: pnpm type-check
        working-directory: frontend
      - name: Run frontend unit tests with coverage (all MFEs)
        # Run Vitest across all 8 MFE workspaces so every app's test suite is gated on every PR.
        # The recursive --filter covers: shell, voice-mfe, triage-mfe, scheduling-mfe,
        # pophealth-mfe, revenue-mfe, encounters-mfe, engagement-mfe.
        run: pnpm --filter "./apps/*" run test -- --coverage --reporter=verbose
        working-directory: frontend
      - run: pnpm build
        working-directory: frontend
      - name: Install bundlewatch
        run: pnpm add -g bundlewatch
        working-directory: frontend
      - name: Check bundle size budgets
        run: bundlewatch --config bundlewatch.config.json
        working-directory: frontend
        env:
          BUNDLEWATCH_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_REPO_OWNER:   ${{ github.repository_owner }}
          CI_REPO_NAME:    ${{ github.event.repository.name }}
          CI_COMMIT_SHA:   ${{ github.event.pull_request.head.sha || github.sha }}
          CI_BRANCH:       ${{ github.head_ref || github.ref_name }}
          CI_BRANCH_BASE:  main
