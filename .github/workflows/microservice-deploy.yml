name: Microservice CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

permissions:
  id-token: write
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/healthcare-ai/healthq-copilot
  ACA_RESOURCE_GROUP: healthq-copilot-rg
  ACA_ENVIRONMENT: healthq-copilot-env

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      voice: ${{ steps.filter.outputs.voice }}
      ai-agent: ${{ steps.filter.outputs.ai-agent }}
      fhir: ${{ steps.filter.outputs.fhir }}
      identity: ${{ steps.filter.outputs.identity }}
      ocr: ${{ steps.filter.outputs.ocr }}
      scheduling: ${{ steps.filter.outputs.scheduling }}
      notification: ${{ steps.filter.outputs.notification }}
      pop-health: ${{ steps.filter.outputs.pop-health }}
      revenue: ${{ steps.filter.outputs.revenue }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            voice:        ['src/HealthQCopilot.Voice/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**']
            ai-agent:     ['src/HealthQCopilot.Agents/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**']
            fhir:         ['src/HealthQCopilot.Fhir/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**']
            identity:     ['src/HealthQCopilot.Identity/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**']
            ocr:          ['src/HealthQCopilot.Ocr/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**']
            scheduling:   ['src/HealthQCopilot.Scheduling/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**']
            notification: ['src/HealthQCopilot.Notifications/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**']
            pop-health:   ['src/HealthQCopilot.PopulationHealth/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**']
            revenue:      ['src/HealthQCopilot.RevenueCycle/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**']

  test-and-build:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: voice
            project: HealthQCopilot.Voice
            changed: ${{ needs.detect-changes.outputs.voice }}
          - service: ai-agent
            project: HealthQCopilot.Agents
            changed: ${{ needs.detect-changes.outputs.ai-agent }}
          - service: fhir
            project: HealthQCopilot.Fhir
            changed: ${{ needs.detect-changes.outputs.fhir }}
          - service: identity
            project: HealthQCopilot.Identity
            changed: ${{ needs.detect-changes.outputs.identity }}
          - service: ocr
            project: HealthQCopilot.Ocr
            changed: ${{ needs.detect-changes.outputs.ocr }}
          - service: scheduling
            project: HealthQCopilot.Scheduling
            changed: ${{ needs.detect-changes.outputs.scheduling }}
          - service: notification
            project: HealthQCopilot.Notifications
            changed: ${{ needs.detect-changes.outputs.notification }}
          - service: pop-health
            project: HealthQCopilot.PopulationHealth
            changed: ${{ needs.detect-changes.outputs.pop-health }}
          - service: revenue
            project: HealthQCopilot.RevenueCycle
            changed: ${{ needs.detect-changes.outputs.revenue }}
    if: always()
    steps:
      - uses: actions/checkout@v4
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
      - uses: actions/setup-dotnet@v4
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        with:
          dotnet-version: '9.0.x'

      - name: Build + format check
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          dotnet build src/${{ matrix.project }} --configuration Release
          dotnet format src/${{ matrix.project }} --verify-no-changes

      - name: Unit tests
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          dotnet test tests/HealthQCopilot.Tests.Unit \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Integration tests
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        continue-on-error: true
        run: dotnet test tests/HealthQCopilot.Tests.Integration --configuration Release

      - name: Trivy vulnerability scan
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: src/${{ matrix.project }}
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Azure login (OIDC)
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push to GHCR
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker build \
            --file src/${{ matrix.project }}/Dockerfile \
            --tag ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }} \
            --tag ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest \
            .
          docker push ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          docker push ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest

      - name: Deploy to Azure Container Apps
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        run: |
          az containerapp update \
            --name ${{ matrix.service }} \
            --resource-group ${{ env.ACA_RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }} \
            --min-replicas 1
          az containerapp ingress update \
            --name ${{ matrix.service }} \
            --resource-group ${{ env.ACA_RESOURCE_GROUP }} \
            --type external \
            --target-port 8080

      - name: Update Helm image tag for GitOps (ArgoCD)
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        run: |
          # Map CI matrix service name to Helm values key
          SERVICE_KEY="${{ matrix.service }}"
          # ai-agent maps to the 'ai-agent' key in values.yaml
          VALUES_FILE="infra/helm/values.yaml"
          PROD_VALUES="infra/helm/values.production.yaml"

          # Update the image tag in values.production.yaml (create if missing)
          if [ ! -f "$PROD_VALUES" ]; then
            echo "services:" > "$PROD_VALUES"
          fi

          # Use Python (available on ubuntu-latest) for safe YAML key update
          python3 - <<'PYEOF'
          import sys, re

          service = "${{ matrix.service }}"
          sha     = "${{ github.sha }}"
          path    = "infra/helm/values.production.yaml"

          try:
              with open(path) as f:
                  content = f.read()
          except FileNotFoundError:
              content = "services:\n"

          # Replace or append the image tag for this service
          pattern = rf'(  {re.escape(service)}:.*?\n(?:    .*\n)*?    image:\n(?:      .*\n)*?      tag: ).*\n'
          replacement = rf'\g<1>{sha}\n'
          new_content, n = re.subn(pattern, replacement, content, flags=re.MULTILINE)

          if n == 0:
              # Service block not found — append a minimal override
              new_content = content.rstrip('\n') + f"\n  {service}:\n    image:\n      tag: {sha}\n"

          with open(path, 'w') as f:
              f.write(new_content)

          print(f"Updated {service} → {sha} in {path}")
          PYEOF

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/helm/values.production.yaml
          git diff --staged --quiet || git commit -m "ci: update ${{ matrix.service }} image tag to ${{ github.sha }}"
          git push || true  # Non-fatal: ArgoCD poll will catch next sync anyway
