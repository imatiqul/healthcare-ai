name: Microservice CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      services:
        description: 'Comma-separated service ids to redeploy on manual runs, or all'
        required: false
        default: 'all'
        type: string
      skip_format_check:
        description: 'Set true to bypass dotnet format verification for manual emergency redeploys'
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: write
  packages: write
  attestations: write   # for SBOM + Cosign attestations

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/healthcare-ai/healthq-copilot
  ACA_RESOURCE_GROUP: healthq-copilot-rg
  ACA_ENVIRONMENT: healthq-copilot-env

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      voice: ${{ steps.filter.outputs.voice }}
      ai-agent: ${{ steps.filter.outputs.ai-agent }}
      fhir: ${{ steps.filter.outputs.fhir }}
      identity: ${{ steps.filter.outputs.identity }}
      ocr: ${{ steps.filter.outputs.ocr }}
      scheduling: ${{ steps.filter.outputs.scheduling }}
      notification: ${{ steps.filter.outputs.notification }}
      pop-health: ${{ steps.filter.outputs.pop-health }}
      revenue: ${{ steps.filter.outputs.revenue }}
      gateway: ${{ steps.filter.outputs.gateway }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            voice:        ['src/HealthQCopilot.Voice/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**', 'Directory.Build.props', 'global.json', 'HealthQCopilot.sln', '.editorconfig']
            ai-agent:     ['src/HealthQCopilot.Agents/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**', 'Directory.Build.props', 'global.json', 'HealthQCopilot.sln', '.editorconfig']
            fhir:         ['src/HealthQCopilot.Fhir/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**', 'Directory.Build.props', 'global.json', 'HealthQCopilot.sln', '.editorconfig']
            identity:     ['src/HealthQCopilot.Identity/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**', 'Directory.Build.props', 'global.json', 'HealthQCopilot.sln', '.editorconfig']
            ocr:          ['src/HealthQCopilot.Ocr/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**', 'Directory.Build.props', 'global.json', 'HealthQCopilot.sln', '.editorconfig']
            scheduling:   ['src/HealthQCopilot.Scheduling/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**', 'Directory.Build.props', 'global.json', 'HealthQCopilot.sln', '.editorconfig']
            notification: ['src/HealthQCopilot.Notifications/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**', 'Directory.Build.props', 'global.json', 'HealthQCopilot.sln', '.editorconfig']
            pop-health:   ['src/HealthQCopilot.PopulationHealth/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**', 'Directory.Build.props', 'global.json', 'HealthQCopilot.sln', '.editorconfig']
            revenue:      ['src/HealthQCopilot.RevenueCycle/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**', 'Directory.Build.props', 'global.json', 'HealthQCopilot.sln', '.editorconfig']
            gateway:      ['src/HealthQCopilot.Gateway/**', 'src/HealthQCopilot.ServiceDefaults/**', 'Directory.Build.props', 'global.json', 'HealthQCopilot.sln', '.editorconfig']

  validate-dispatch-inputs:
    runs-on: ubuntu-latest
    outputs:
      normalized_services: ${{ steps.validate.outputs.normalized_services }}
      skip_format_check: ${{ steps.validate.outputs.skip_format_check }}
    steps:
      - name: Validate manual service selection
        id: validate
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "normalized_services=all" >> "$GITHUB_OUTPUT"
            echo "skip_format_check=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RAW_SERVICES="${{ github.event.inputs.services || 'all' }}"
          NORMALIZED="$(echo "$RAW_SERVICES" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"

          if [ -z "$NORMALIZED" ]; then
            NORMALIZED="all"
          fi

          IFS=',' read -r -a REQUESTED_SERVICES <<< "$NORMALIZED"
          for SERVICE in "${REQUESTED_SERVICES[@]}"; do
            case "$SERVICE" in
              all|voice|ai-agent|fhir|identity|ocr|scheduling|notification|pop-health|revenue|gateway)
                ;;
              *)
                echo "::error::Invalid services input '$SERVICE'. Allowed values: all, voice, ai-agent, fhir, identity, ocr, scheduling, notification, pop-health, revenue, gateway"
                exit 1
                ;;
            esac
          done

          RAW_SKIP_FORMAT="${{ github.event.inputs.skip_format_check }}"
          if [ "$RAW_SKIP_FORMAT" = "true" ]; then
            SKIP_FORMAT_CHECK="true"
          else
            SKIP_FORMAT_CHECK="false"
          fi

          echo "normalized_services=$NORMALIZED" >> "$GITHUB_OUTPUT"
          echo "skip_format_check=$SKIP_FORMAT_CHECK" >> "$GITHUB_OUTPUT"

  test-and-build:
    needs: [detect-changes, validate-dispatch-inputs]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: voice
            project: HealthQCopilot.Voice
            changed: ${{ needs.detect-changes.outputs.voice }}
          - service: ai-agent
            project: HealthQCopilot.Agents
            changed: ${{ needs.detect-changes.outputs.ai-agent }}
          - service: fhir
            project: HealthQCopilot.Fhir
            changed: ${{ needs.detect-changes.outputs.fhir }}
          - service: identity
            project: HealthQCopilot.Identity
            changed: ${{ needs.detect-changes.outputs.identity }}
          - service: ocr
            project: HealthQCopilot.Ocr
            changed: ${{ needs.detect-changes.outputs.ocr }}
          - service: scheduling
            project: HealthQCopilot.Scheduling
            changed: ${{ needs.detect-changes.outputs.scheduling }}
          - service: notification
            project: HealthQCopilot.Notifications
            changed: ${{ needs.detect-changes.outputs.notification }}
          - service: pop-health
            project: HealthQCopilot.PopulationHealth
            changed: ${{ needs.detect-changes.outputs.pop-health }}
          - service: revenue
            project: HealthQCopilot.RevenueCycle
            changed: ${{ needs.detect-changes.outputs.revenue }}
          - service: gateway
            project: HealthQCopilot.Gateway
            changed: ${{ needs.detect-changes.outputs.gateway }}
    if: needs.detect-changes.result == 'success' && needs.validate-dispatch-inputs.result == 'success'
    steps:
      - name: Resolve manual service selection
        id: service-selection
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "selected=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RAW_SERVICES="${{ needs.validate-dispatch-inputs.outputs.normalized_services }}"
          NORMALIZED="$(echo "$RAW_SERVICES" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"

          if [ -z "$NORMALIZED" ] || [ "$NORMALIZED" = "all" ]; then
            echo "selected=true" >> "$GITHUB_OUTPUT"
          elif [[ ",$NORMALIZED," == *",${{ matrix.service }},"* ]]; then
            echo "selected=true" >> "$GITHUB_OUTPUT"
          else
            echo "selected=false" >> "$GITHUB_OUTPUT"
            echo "Skipping matrix service '${{ matrix.service }}' because it is not in services='$RAW_SERVICES'."
          fi

      - uses: actions/checkout@v4
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && steps.service-selection.outputs.selected == 'true'
      - uses: actions/setup-dotnet@v4
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && steps.service-selection.outputs.selected == 'true'
        with:
          dotnet-version: '10.0.x'

      - name: Build
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && steps.service-selection.outputs.selected == 'true'
        run: |
          dotnet build src/${{ matrix.project }} --configuration Release

      - name: Format check
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && steps.service-selection.outputs.selected == 'true' && !(github.event_name == 'workflow_dispatch' && needs.validate-dispatch-inputs.outputs.skip_format_check == 'true')
        run: |
          dotnet format src/${{ matrix.project }} --verify-no-changes

      - name: Format check bypass notice
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && steps.service-selection.outputs.selected == 'true' && github.event_name == 'workflow_dispatch' && needs.validate-dispatch-inputs.outputs.skip_format_check == 'true'
        run: |
          echo "::warning::Skipping dotnet format verification for manual workflow_dispatch run (skip_format_check=true)."

      - name: Unit tests
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && steps.service-selection.outputs.selected == 'true'
        run: |
          dotnet test tests/HealthQCopilot.Tests.Unit \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Integration tests
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && steps.service-selection.outputs.selected == 'true'
        continue-on-error: true
        run: dotnet test tests/HealthQCopilot.Tests.Integration --configuration Release

      - name: Trivy vulnerability scan
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && steps.service-selection.outputs.selected == 'true'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: src/${{ matrix.project }}
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Azure login (OIDC)
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && steps.service-selection.outputs.selected == 'true' && github.ref == 'refs/heads/main'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Docker Buildx + layer caching ──────────────────────────────────────
      - name: Set up Docker Buildx
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && steps.service-selection.outputs.selected == 'true' && github.ref == 'refs/heads/main'
        uses: docker/setup-buildx-action@v3

      - name: Restore Docker layer cache
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && steps.service-selection.outputs.selected == 'true' && github.ref == 'refs/heads/main'
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache/${{ matrix.service }}
          key: ${{ runner.os }}-buildx-${{ matrix.service }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.service }}-

      - name: Log in to GHCR
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && steps.service-selection.outputs.selected == 'true' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR (with SBOM + provenance)
        id: docker-build
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && steps.service-selection.outputs.selected == 'true' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/${{ matrix.project }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=local,src=/tmp/.buildx-cache/${{ matrix.service }}
          cache-to: type=local,dest=/tmp/.buildx-cache-new/${{ matrix.service }},mode=max
          sbom: true
          provenance: true
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Rotate Docker layer cache
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && steps.service-selection.outputs.selected == 'true' && github.ref == 'refs/heads/main'
        run: |
          rm -rf /tmp/.buildx-cache/${{ matrix.service }}
          mv /tmp/.buildx-cache-new/${{ matrix.service }} /tmp/.buildx-cache/${{ matrix.service }} 2>/dev/null || true

      # ── Cosign: keyless OIDC image signing ──────────────────────────────────
      - name: Install Cosign
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && steps.service-selection.outputs.selected == 'true' && github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (keyless OIDC)
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && steps.service-selection.outputs.selected == 'true' && github.ref == 'refs/heads/main'
        run: |
          cosign sign --yes \
            "${{ env.IMAGE_PREFIX }}/${{ matrix.service }}@${{ steps.docker-build.outputs.digest }}"

      - name: Deploy to Azure Container Apps
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && steps.service-selection.outputs.selected == 'true' && github.ref == 'refs/heads/main'
        run: |
          SERVICE="${{ matrix.service }}"
          RG="${{ env.ACA_RESOURCE_GROUP }}"
          IMAGE="${{ env.IMAGE_PREFIX }}/${SERVICE}:${{ github.sha }}"

          # Guard: skip gracefully if the Container App doesn't exist yet.
          # This lets CI pass while ACA infrastructure is still being provisioned.
          if ! az containerapp show --name "$SERVICE" --resource-group "$RG" \
               --query name -o tsv 2>/dev/null; then
            echo "::warning::Container App '$SERVICE' not found in resource group '$RG'."
            echo "Skipping deployment — provision ACA resources first (see infra/)."
            exit 0
          fi

          # Configure GHCR pull credentials (idempotent; skip if secret not yet set).
          PULL_TOKEN="${{ secrets.GHCR_PULL_TOKEN }}"
          if [ -n "$PULL_TOKEN" ]; then
            az containerapp registry set \
              --name "$SERVICE" \
              --resource-group "$RG" \
              --server ghcr.io \
              --username "${{ github.repository_owner }}" \
              --password "$PULL_TOKEN"
          else
            echo "::warning::GHCR_PULL_TOKEN secret not set — skipping registry credential update."
          fi

          az containerapp update \
            --name "$SERVICE" \
            --resource-group "$RG" \
            --image "$IMAGE" \
            --min-replicas 1

          # Only the gateway is internet-facing; all other services stay internal
          # (reachable only from within the ACA environment via Dapr/service-to-service)
          if [ "$SERVICE" = "gateway" ]; then
            INGRESS_TYPE="external"
          else
            INGRESS_TYPE="internal"
          fi
          az containerapp ingress update \
            --name "$SERVICE" \
            --resource-group "$RG" \
            --type "$INGRESS_TYPE" \
            --target-port 8080

      - name: Update Helm image tag for GitOps (ArgoCD)
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && steps.service-selection.outputs.selected == 'true' && github.ref == 'refs/heads/main'
        run: |
          # Map CI matrix service name to Helm values key
          SERVICE_KEY="${{ matrix.service }}"
          # ai-agent maps to the 'ai-agent' key in values.yaml
          VALUES_FILE="infra/helm/values.yaml"
          PROD_VALUES="infra/helm/values.production.yaml"

          # Update the image tag in values.production.yaml (create if missing)
          if [ ! -f "$PROD_VALUES" ]; then
            echo "services:" > "$PROD_VALUES"
          fi

          # Use Python (available on ubuntu-latest) for safe YAML key update
          python3 - <<'PYEOF'
          import sys, re

          service = "${{ matrix.service }}"
          sha     = "${{ github.sha }}"
          path    = "infra/helm/values.production.yaml"

          try:
              with open(path) as f:
                  content = f.read()
          except FileNotFoundError:
              content = "services:\n"

          # Replace or append the image tag for this service
          pattern = rf'(  {re.escape(service)}:.*?\n(?:    .*\n)*?    image:\n(?:      .*\n)*?      tag: ).*\n'
          replacement = rf'\g<1>{sha}\n'
          new_content, n = re.subn(pattern, replacement, content, flags=re.MULTILINE)

          if n == 0:
              # Service block not found — append a minimal override
              new_content = content.rstrip('\n') + f"\n  {service}:\n    image:\n      tag: {sha}\n"

          with open(path, 'w') as f:
              f.write(new_content)

          print(f"Updated {service} → {sha} in {path}")
          PYEOF

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/helm/values.production.yaml
          git diff --staged --quiet || git commit -m "ci: update ${{ matrix.service }} image tag to ${{ github.sha }}"
          git push || true  # Non-fatal: ArgoCD poll will catch next sync anyway

  # ── Post-deploy smoke tests ──────────────────────────────────────────────────
  # Runs after ALL matrix deploy jobs complete, but only when at least one service
  # was actually built & deployed (or triggered manually).
  # Verifies every ACA service returns a healthy response via the external gateway.
  post-deploy-smoke:
    needs: [detect-changes, test-and-build]
    if: >
      needs.test-and-build.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.detect-changes.outputs.voice == 'true' ||
        needs.detect-changes.outputs.ai-agent == 'true' ||
        needs.detect-changes.outputs.fhir == 'true' ||
        needs.detect-changes.outputs.identity == 'true' ||
        needs.detect-changes.outputs.ocr == 'true' ||
        needs.detect-changes.outputs.scheduling == 'true' ||
        needs.detect-changes.outputs.notification == 'true' ||
        needs.detect-changes.outputs.pop-health == 'true' ||
        needs.detect-changes.outputs.revenue == 'true' ||
        needs.detect-changes.outputs.gateway == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GATEWAY_URL: https://gateway.gentletree-fe920881.eastus2.azurecontainerapps.io
    steps:
      - uses: actions/checkout@v4

      - name: Wait for ACA replicas to stabilise
        run: sleep 30

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify ACA revision active status
        run: |
          set -e
          SERVICES=(voice ai-agent fhir identity ocr scheduling notification pop-health revenue gateway)
          ACA_RG="${{ env.ACA_RESOURCE_GROUP }}"
          ALL_HEALTHY=true

          for SVC in "${SERVICES[@]}"; do
            echo "── Checking $SVC ──"
            PROVISION=$(az containerapp show \
              --name "$SVC" \
              --resource-group "$ACA_RG" \
              --query "properties.latestRevisionName" -o tsv 2>/dev/null || echo "not-found")

            if [ "$PROVISION" = "not-found" ]; then
              echo "  ⚠️  Container app '$SVC' not found in $ACA_RG — skipping"
              continue
            fi

            RUNNING=$(az containerapp revision show \
              --name "$SVC" \
              --resource-group "$ACA_RG" \
              --revision "$PROVISION" \
              --query "properties.active" -o tsv 2>/dev/null || echo "false")

            if [ "$RUNNING" = "true" ]; then
              echo "  ✅ $SVC → revision $PROVISION is active"
            else
              echo "  ❌ $SVC → revision $PROVISION is NOT active (running=$RUNNING)"
              ALL_HEALTHY=false
            fi
          done

          if [ "$ALL_HEALTHY" = "false" ]; then
            echo "One or more services failed revision check"
            exit 1
          fi

      - name: Gateway liveness probe
        run: |
          set -e
          echo "Probing gateway health endpoint..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 --retry 3 --retry-delay 5 \
            "${{ env.GATEWAY_URL }}/health")
          echo "Gateway /health → HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Gateway health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Gateway is healthy"

      - name: Prepare live seed data via gateway
        run: bash .github/scripts/prepare-live-seed-data.sh
        env:
          LIVE_API_BASE_URL: ${{ env.GATEWAY_URL }}

      - name: Service smoke tests via gateway
        run: |
          set -e
          declare -A PATHS=(
            [voice]="/api/v1/voice/sessions"
            [ai-agent]="/api/v1/agents/escalations"
            [fhir]="/api/v1/fhir/patients"
            [identity]="/api/v1/identity/users"
            [scheduling]="/api/v1/scheduling/slots"
            [notification]="/api/v1/notifications/messages"
            [pop-health]="/api/v1/population-health/risks"
            [revenue]="/api/v1/revenue/coding-jobs"
          )

          FAIL=0
          for SVC in "${!PATHS[@]}"; do
            SVC_PATH="${PATHS[$SVC]}"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 --retry 2 --retry-delay 3 \
              "${{ env.GATEWAY_URL }}${SVC_PATH}")
            # 2xx = OK, 400/401/403 can still prove the routed service is alive.
            # 404/405 = missing route or wrong method; 5xx/connection errors = service down.
            if [ "$STATUS" = "404" ] || [ "$STATUS" = "405" ] || [ "$STATUS" -ge 500 ]; then
              echo "❌ $SVC ($SVC_PATH) → HTTP $STATUS"
              FAIL=1
            else
              echo "✅ $SVC ($SVC_PATH) → HTTP $STATUS"
            fi
          done

          # Phase 12 — new endpoint smoke checks
          declare -A PHASE12_PATHS=(
            [scheduling-slots]="/api/v1/scheduling/slots"
            [revenue-denials]="/api/v1/revenue/denials"
            [notifications-delivery]="/api/v1/notifications/messages"
            [notifications-analytics]="/api/v1/notifications/analytics/delivery"
          )
          for ENDPOINT in "${!PHASE12_PATHS[@]}"; do
            SVC_PATH="${PHASE12_PATHS[$ENDPOINT]}"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 --retry 2 --retry-delay 3 \
              "${{ env.GATEWAY_URL }}${SVC_PATH}")
            if [ "$STATUS" = "404" ] || [ "$STATUS" = "405" ] || [ "$STATUS" -ge 500 ]; then
              echo "❌ Phase-12 $ENDPOINT ($SVC_PATH) → HTTP $STATUS"
              FAIL=1
            else
              echo "✅ Phase-12 $ENDPOINT ($SVC_PATH) → HTTP $STATUS"
            fi
          done

          if [ "$FAIL" = "1" ]; then
            echo ""
            echo "One or more service smoke tests failed. Check ACA logs for 5xx errors."
            exit 1
          fi
          echo ""
          echo "All service smoke tests passed ✅"

      - name: Annotate deployment summary
        if: always()
        run: |
          echo "## Deployment Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | Environment | Gateway |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ github.sha }}\` | production | ${{ env.GATEWAY_URL }} |" >> $GITHUB_STEP_SUMMARY

