name: Microservice CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  packages: write
  attestations: write   # for SBOM + Cosign attestations

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/healthcare-ai/healthq-copilot
  ACA_RESOURCE_GROUP: healthq-copilot-rg
  ACA_ENVIRONMENT: healthq-copilot-env

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      voice: ${{ steps.filter.outputs.voice }}
      ai-agent: ${{ steps.filter.outputs.ai-agent }}
      fhir: ${{ steps.filter.outputs.fhir }}
      identity: ${{ steps.filter.outputs.identity }}
      ocr: ${{ steps.filter.outputs.ocr }}
      scheduling: ${{ steps.filter.outputs.scheduling }}
      notification: ${{ steps.filter.outputs.notification }}
      pop-health: ${{ steps.filter.outputs.pop-health }}
      revenue: ${{ steps.filter.outputs.revenue }}
      gateway: ${{ steps.filter.outputs.gateway }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            voice:        ['src/HealthQCopilot.Voice/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**']
            ai-agent:     ['src/HealthQCopilot.Agents/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**']
            fhir:         ['src/HealthQCopilot.Fhir/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**']
            identity:     ['src/HealthQCopilot.Identity/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**']
            ocr:          ['src/HealthQCopilot.Ocr/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**']
            scheduling:   ['src/HealthQCopilot.Scheduling/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**']
            notification: ['src/HealthQCopilot.Notifications/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**']
            pop-health:   ['src/HealthQCopilot.PopulationHealth/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**']
            revenue:      ['src/HealthQCopilot.RevenueCycle/**', 'src/HealthQCopilot.Domain/**', 'src/HealthQCopilot.Infrastructure/**', 'src/HealthQCopilot.ServiceDefaults/**']
            gateway:      ['src/HealthQCopilot.Gateway/**', 'src/HealthQCopilot.ServiceDefaults/**']

  test-and-build:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: voice
            project: HealthQCopilot.Voice
            changed: ${{ needs.detect-changes.outputs.voice }}
          - service: ai-agent
            project: HealthQCopilot.Agents
            changed: ${{ needs.detect-changes.outputs.ai-agent }}
          - service: fhir
            project: HealthQCopilot.Fhir
            changed: ${{ needs.detect-changes.outputs.fhir }}
          - service: identity
            project: HealthQCopilot.Identity
            changed: ${{ needs.detect-changes.outputs.identity }}
          - service: ocr
            project: HealthQCopilot.Ocr
            changed: ${{ needs.detect-changes.outputs.ocr }}
          - service: scheduling
            project: HealthQCopilot.Scheduling
            changed: ${{ needs.detect-changes.outputs.scheduling }}
          - service: notification
            project: HealthQCopilot.Notifications
            changed: ${{ needs.detect-changes.outputs.notification }}
          - service: pop-health
            project: HealthQCopilot.PopulationHealth
            changed: ${{ needs.detect-changes.outputs.pop-health }}
          - service: revenue
            project: HealthQCopilot.RevenueCycle
            changed: ${{ needs.detect-changes.outputs.revenue }}
          - service: gateway
            project: HealthQCopilot.Gateway
            changed: ${{ needs.detect-changes.outputs.gateway }}
    if: always()
    steps:
      - uses: actions/checkout@v4
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
      - uses: actions/setup-dotnet@v4
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        with:
          dotnet-version: '9.0.x'

      - name: Build + format check
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          dotnet build src/${{ matrix.project }} --configuration Release
          dotnet format src/${{ matrix.project }} --verify-no-changes

      - name: Unit tests
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          dotnet test tests/HealthQCopilot.Tests.Unit \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Integration tests
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        continue-on-error: true
        run: dotnet test tests/HealthQCopilot.Tests.Integration --configuration Release

      - name: Trivy vulnerability scan
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: src/${{ matrix.project }}
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Azure login (OIDC)
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Docker Buildx + layer caching ──────────────────────────────────────
      - name: Set up Docker Buildx
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: docker/setup-buildx-action@v3

      - name: Restore Docker layer cache
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache/${{ matrix.service }}
          key: ${{ runner.os }}-buildx-${{ matrix.service }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.service }}-

      - name: Log in to GHCR
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR (with SBOM + provenance)
        id: docker-build
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/${{ matrix.project }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=local,src=/tmp/.buildx-cache/${{ matrix.service }}
          cache-to: type=local,dest=/tmp/.buildx-cache-new/${{ matrix.service }},mode=max
          sbom: true
          provenance: true
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Rotate Docker layer cache
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        run: |
          rm -rf /tmp/.buildx-cache/${{ matrix.service }}
          mv /tmp/.buildx-cache-new/${{ matrix.service }} /tmp/.buildx-cache/${{ matrix.service }} 2>/dev/null || true

      # ── Cosign: keyless OIDC image signing ──────────────────────────────────
      - name: Install Cosign
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (keyless OIDC)
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        run: |
          cosign sign --yes \
            "${{ env.IMAGE_PREFIX }}/${{ matrix.service }}@${{ steps.docker-build.outputs.digest }}"

      - name: Deploy to Azure Container Apps
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        run: |
          # Ensure ACA has GHCR pull credentials (idempotent — safe on every deploy).
          # Requires a long-lived GitHub PAT with read:packages scope stored as GHCR_PULL_TOKEN.
          az containerapp registry set \
            --name ${{ matrix.service }} \
            --resource-group ${{ env.ACA_RESOURCE_GROUP }} \
            --server ghcr.io \
            --username ${{ github.repository_owner }} \
            --password ${{ secrets.GHCR_PULL_TOKEN }}

          az containerapp update \
            --name ${{ matrix.service }} \
            --resource-group ${{ env.ACA_RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }} \
            --min-replicas 1
          # Only the gateway is internet-facing; all other services stay internal
          # (reachable only from within the ACA environment via Dapr/service-to-service)
          if [ "${{ matrix.service }}" = "gateway" ]; then
            INGRESS_TYPE="external"
          else
            INGRESS_TYPE="internal"
          fi
          az containerapp ingress update \
            --name ${{ matrix.service }} \
            --resource-group ${{ env.ACA_RESOURCE_GROUP }} \
            --type $INGRESS_TYPE \
            --target-port 8080

      - name: Update Helm image tag for GitOps (ArgoCD)
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        run: |
          # Map CI matrix service name to Helm values key
          SERVICE_KEY="${{ matrix.service }}"
          # ai-agent maps to the 'ai-agent' key in values.yaml
          VALUES_FILE="infra/helm/values.yaml"
          PROD_VALUES="infra/helm/values.production.yaml"

          # Update the image tag in values.production.yaml (create if missing)
          if [ ! -f "$PROD_VALUES" ]; then
            echo "services:" > "$PROD_VALUES"
          fi

          # Use Python (available on ubuntu-latest) for safe YAML key update
          python3 - <<'PYEOF'
          import sys, re

          service = "${{ matrix.service }}"
          sha     = "${{ github.sha }}"
          path    = "infra/helm/values.production.yaml"

          try:
              with open(path) as f:
                  content = f.read()
          except FileNotFoundError:
              content = "services:\n"

          # Replace or append the image tag for this service
          pattern = rf'(  {re.escape(service)}:.*?\n(?:    .*\n)*?    image:\n(?:      .*\n)*?      tag: ).*\n'
          replacement = rf'\g<1>{sha}\n'
          new_content, n = re.subn(pattern, replacement, content, flags=re.MULTILINE)

          if n == 0:
              # Service block not found — append a minimal override
              new_content = content.rstrip('\n') + f"\n  {service}:\n    image:\n      tag: {sha}\n"

          with open(path, 'w') as f:
              f.write(new_content)

          print(f"Updated {service} → {sha} in {path}")
          PYEOF

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/helm/values.production.yaml
          git diff --staged --quiet || git commit -m "ci: update ${{ matrix.service }} image tag to ${{ github.sha }}"
          git push || true  # Non-fatal: ArgoCD poll will catch next sync anyway

  # ── Post-deploy smoke tests ──────────────────────────────────────────────────
  # Runs after ALL matrix deploy jobs complete, but only when at least one service
  # was actually built & deployed (or triggered manually).
  # Verifies every ACA service returns a healthy response via the external gateway.
  post-deploy-smoke:
    needs: [detect-changes, test-and-build]
    if: >
      needs.test-and-build.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.detect-changes.outputs.voice == 'true' ||
        needs.detect-changes.outputs.ai-agent == 'true' ||
        needs.detect-changes.outputs.fhir == 'true' ||
        needs.detect-changes.outputs.identity == 'true' ||
        needs.detect-changes.outputs.ocr == 'true' ||
        needs.detect-changes.outputs.scheduling == 'true' ||
        needs.detect-changes.outputs.notification == 'true' ||
        needs.detect-changes.outputs.pop-health == 'true' ||
        needs.detect-changes.outputs.revenue == 'true' ||
        needs.detect-changes.outputs.gateway == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GATEWAY_URL: https://gateway.gentletree-fe920881.eastus2.azurecontainerapps.io
    steps:
      - name: Wait for ACA replicas to stabilise
        run: sleep 30

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify ACA revision active status
        run: |
          set -e
          SERVICES=(voice ai-agent fhir identity ocr scheduling notification pop-health revenue gateway)
          ACA_RG="${{ env.ACA_RESOURCE_GROUP }}"
          ALL_HEALTHY=true

          for SVC in "${SERVICES[@]}"; do
            echo "── Checking $SVC ──"
            PROVISION=$(az containerapp show \
              --name "$SVC" \
              --resource-group "$ACA_RG" \
              --query "properties.latestRevisionName" -o tsv 2>/dev/null || echo "not-found")

            if [ "$PROVISION" = "not-found" ]; then
              echo "  ⚠️  Container app '$SVC' not found in $ACA_RG — skipping"
              continue
            fi

            RUNNING=$(az containerapp revision show \
              --name "$SVC" \
              --resource-group "$ACA_RG" \
              --revision "$PROVISION" \
              --query "properties.active" -o tsv 2>/dev/null || echo "false")

            if [ "$RUNNING" = "true" ]; then
              echo "  ✅ $SVC → revision $PROVISION is active"
            else
              echo "  ❌ $SVC → revision $PROVISION is NOT active (running=$RUNNING)"
              ALL_HEALTHY=false
            fi
          done

          if [ "$ALL_HEALTHY" = "false" ]; then
            echo "One or more services failed revision check"
            exit 1
          fi

      - name: Gateway liveness probe
        run: |
          set -e
          echo "Probing gateway health endpoint..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 --retry 3 --retry-delay 5 \
            "${{ env.GATEWAY_URL }}/health")
          echo "Gateway /health → HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Gateway health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Gateway is healthy"

      - name: Service smoke tests via gateway
        run: |
          set -e
          declare -A PATHS=(
            [voice]="/api/v1/voice/sessions"
            [ai-agent]="/api/v1/agents/escalations"
            [fhir]="/api/v1/fhir/patients"
            [identity]="/api/v1/identity/users"
            [scheduling]="/api/v1/scheduling/slots"
            [notification]="/api/v1/notifications/messages"
            [pop-health]="/api/v1/population-health/risks"
            [revenue]="/api/v1/revenue/coding-jobs"
          )

          FAIL=0
          for SVC in "${!PATHS[@]}"; do
            SVC_PATH="${PATHS[$SVC]}"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 --retry 2 --retry-delay 3 \
              "${{ env.GATEWAY_URL }}${SVC_PATH}")
            # 2xx = OK, 401/403 = service up (auth required), 404 = route not found
            # Only 5xx or connection errors indicate the service is down
            if [ "$STATUS" -ge 500 ]; then
              echo "❌ $SVC ($SVC_PATH) → HTTP $STATUS"
              FAIL=1
            else
              echo "✅ $SVC ($SVC_PATH) → HTTP $STATUS"
            fi
          done

          # Phase 12 — new endpoint smoke checks
          declare -A PHASE12_PATHS=(
            [scheduling-waitlist]="/api/v1/scheduling/waitlist"
            [revenue-denials]="/api/v1/revenue/denials"
            [notifications-delivery]="/api/v1/notifications/messages"
            [notifications-analytics]="/api/v1/notifications/analytics/delivery"
          )
          for ENDPOINT in "${!PHASE12_PATHS[@]}"; do
            SVC_PATH="${PHASE12_PATHS[$ENDPOINT]}"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 --retry 2 --retry-delay 3 \
              "${{ env.GATEWAY_URL }}${SVC_PATH}")
            if [ "$STATUS" -ge 500 ]; then
              echo "❌ Phase-12 $ENDPOINT ($SVC_PATH) → HTTP $STATUS"
              FAIL=1
            else
              echo "✅ Phase-12 $ENDPOINT ($SVC_PATH) → HTTP $STATUS"
            fi
          done

          if [ "$FAIL" = "1" ]; then
            echo ""
            echo "One or more service smoke tests failed. Check ACA logs for 5xx errors."
            exit 1
          fi
          echo ""
          echo "All service smoke tests passed ✅"

      - name: Annotate deployment summary
        if: always()
        run: |
          echo "## Deployment Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | Environment | Gateway |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ github.sha }}\` | production | ${{ env.GATEWAY_URL }} |" >> $GITHUB_STEP_SUMMARY

