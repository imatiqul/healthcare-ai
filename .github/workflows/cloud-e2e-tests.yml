name: Cloud E2E Tests

on:
  # Trigger automatically after either deploy workflow completes on main.
  # The sync gate enforces same-SHA deploy readiness before live smoke can run.
  workflow_run:
    workflows:
      - "Microservice CI/CD"
      - "Frontend MFE CI/CD"
    types: [completed]
    branches: [main]
  # Also run on a daily schedule to catch environment drift
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC — before business hours
  workflow_dispatch:
    inputs:
      smoke_only:
        description: 'Run @smoke tests only (fast gate, < 60s)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  actions: read
  contents: read

concurrency:
  group: cloud-e2e-${{ github.event.workflow_run.head_sha || github.sha || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: frontend

# ── Shared URL env vars used by all jobs ──────────────────────────────────────
env:
  SHELL_URL: https://gentle-tree-03115af0f.7.azurestaticapps.net
  VOICE_URL: https://happy-smoke-0ba02780f.7.azurestaticapps.net
  TRIAGE_URL: https://brave-hill-0d76ab10f.7.azurestaticapps.net
  SCHEDULING_URL: https://yellow-smoke-0e7b6b70f.7.azurestaticapps.net
  POPHEALTH_URL: https://orange-bay-00f28280f.7.azurestaticapps.net
  REVENUE_URL: https://lemon-pond-067d2f40f.7.azurestaticapps.net
  ENCOUNTERS_URL: https://calm-river-02bddc70f.7.azurestaticapps.net
  ENGAGEMENT_URL: https://agreeable-hill-0d3115b0f.7.azurestaticapps.net
  GATEWAY_ACA_URL: https://gateway.gentletree-fe920881.eastus2.azurecontainerapps.io
  API_BASE_URL: https://healthq-copilot-apim.azure-api.net
  LIVE_CLOUD_E2E_SPECS: e2e-cloud/health-checks.spec.ts e2e-cloud/cloud-smoke.spec.ts

jobs:
  deployment-sync:
    name: Deployment Sync Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    outputs:
      ready: ${{ steps.check.outputs.result }}
    steps:
      - name: Verify required deploy workflows for this SHA
        id: check
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const pollIntervalMs = 30_000;
            const maxAttempts = 20;

            if (context.eventName !== 'workflow_run') {
              await core.summary
                .addHeading('Deployment Sync Gate')
                .addRaw('Manual or scheduled run detected — no upstream workflow sync required.')
                .write();
              return 'true';
            }

            const requiredWorkflows = [
              { name: 'Microservice CI/CD', optionalIfMissing: false },
              { name: 'Frontend MFE CI/CD', optionalIfMissing: true },
            ];
            const headSha = context.payload.workflow_run.head_sha;
            const headBranch = context.payload.workflow_run.head_branch;

            const { owner, repo } = context.repo;
            async function evaluateGate() {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                branch: headBranch,
                head_sha: headSha,
                per_page: 100,
              });

              const rows = [];
              let ready = true;
              let hardFailure = false;
              let terminalNoDeploy = false;

              for (const workflow of requiredWorkflows) {
                const runs = data.workflow_runs
                  .filter((item) => item.name === workflow.name)
                  .sort((left, right) => new Date(right.created_at) - new Date(left.created_at));

                const run = runs[0];
                const status = run?.status ?? (workflow.optionalIfMissing ? 'not-triggered' : 'missing');
                const conclusion = run?.conclusion ?? (workflow.optionalIfMissing ? 'not-required' : 'pending');
                let gateState =
                  !run && workflow.optionalIfMissing
                    ? 'not-required'
                    : status === 'completed' && conclusion === 'success'
                      ? 'ready'
                    : status === 'completed'
                      ? 'failed'
                      : 'waiting';

                if (run && workflow.name === 'Microservice CI/CD' && status === 'completed' && conclusion === 'success') {
                  const jobsResponse = await github.rest.actions.listJobsForWorkflowRun({
                    owner,
                    repo,
                    run_id: run.id,
                    per_page: 100,
                  });
                  const postDeploySmoke = jobsResponse.data.jobs.find((job) => job.name === 'post-deploy-smoke');

                  if (postDeploySmoke?.conclusion === 'success') {
                    gateState = 'ready';
                  } else if (postDeploySmoke?.conclusion === 'skipped') {
                    gateState = 'not-deployed';
                    terminalNoDeploy = true;
                  } else if (!postDeploySmoke || postDeploySmoke.status !== 'completed') {
                    gateState = 'waiting';
                  } else if (postDeploySmoke.conclusion === 'failure') {
                    gateState = 'failed';
                  }
                }

                rows.push([
                  { data: workflow.name, header: false },
                  { data: status, header: false },
                  { data: conclusion, header: false },
                  { data: gateState, header: false },
                ]);

                if (gateState !== 'ready' && gateState !== 'not-required') {
                  ready = false;
                }

                if (gateState === 'failed') {
                  hardFailure = true;
                }
              }

              return { ready, rows, hardFailure, terminalNoDeploy };
            }

            let gateResult = await evaluateGate();

            for (let attempt = 1; !gateResult.ready && !gateResult.hardFailure && !gateResult.terminalNoDeploy && attempt < maxAttempts; attempt += 1) {
              core.info(`Deployment sync gate waiting for required workflows on ${headSha}; retrying in ${pollIntervalMs / 1000}s (${attempt}/${maxAttempts - 1}).`);
              await new Promise((resolve) => setTimeout(resolve, pollIntervalMs));
              gateResult = await evaluateGate();
            }

            await core.summary
              .addHeading('Deployment Sync Gate')
              .addTable([
                [
                  { data: 'Workflow', header: true },
                  { data: 'Status', header: true },
                  { data: 'Conclusion', header: true },
                  { data: 'Gate', header: true },
                ],
                ...gateResult.rows,
              ])
              .addRaw(`SHA: \`${headSha}\` | Branch: \`${headBranch}\``)
              .write();

            if (gateResult.hardFailure) {
              core.setFailed(`Cloud E2E gate blocked: required deploy workflow(s) failed for SHA ${headSha}.`);
              return 'false';
            }

            if (gateResult.terminalNoDeploy) {
              core.notice(`Cloud E2E sync found no deploy execution for SHA ${headSha} (post-deploy-smoke skipped). Full cloud E2E will be skipped for this trigger.`);
            }

            if (!gateResult.ready) {
              core.notice(`Cloud E2E did not observe all required deploy workflows ready for SHA ${headSha} within the wait window. This run will exit in waiting mode.`);
            }

            return gateResult.ready ? 'true' : 'false';

      - name: Write sync summary
        if: always()
        run: |
          if [ "${{ steps.check.outputs.result }}" = "true" ]; then
            echo "Deployment sync gate passed for this SHA." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Deployment sync gate did not observe all required deploy workflows ready within the wait window for this SHA." >> "$GITHUB_STEP_SUMMARY"
          fi

  prepare-live-data:
    name: Prepare Live Seed Data
    needs: deployment-sync
    if: needs.deployment-sync.outputs.ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Seed live demo data and verify AI-agent-backed APIs
        run: bash .github/scripts/prepare-live-seed-data.sh
        env:
          LIVE_API_BASE_URL: ${{ env.GATEWAY_ACA_URL }}

  # ── Job 1: Fast @smoke gate — runs first, blocks the full suite if it fails ──
  smoke-gate:
    needs: prepare-live-data
    name: Smoke Gate (@smoke tests only)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run after a successful upstream deploy, or always on schedule/manual
    if: >
      needs.prepare-live-data.result == 'success' &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'schedule' ||
        github.event.workflow_run.conclusion == 'success'
      )
    outputs:
      smoke_passed: ${{ steps.smoke.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Wait up to 60 s for the shell SWA to respond — SWAs occasionally need
      # a few seconds to warm up after a new deployment propagates globally.
      - name: Wait for shell SWA warmup
        run: |
          echo "Waiting for shell SWA to respond..."
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$SHELL_URL" || echo 000)
            echo "  Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && break
            sleep 10
          done
          echo "Warmup complete."

      - name: Run @smoke tests
        id: smoke
        run: npx playwright test --config=playwright.cloud.config.ts $LIVE_CLOUD_E2E_SPECS --grep "@smoke" --reporter=list,github

      - name: Write smoke summary
        if: always()
        run: |
          echo "## Smoke Gate — @smoke tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.smoke.outcome }}" = "success" ]; then
            echo "✅ All @smoke tests passed — safe to proceed to full suite." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ @smoke tests FAILED — deployment may be broken." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| URL | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
            for swa in shell voice triage scheduling pophealth revenue encounters engagement; do
              URL_VAR="${swa^^}_URL"
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${!URL_VAR}" 2>/dev/null || echo ERR)
              echo "| ${swa} | HTTP $STATUS |" >> $GITHUB_STEP_SUMMARY
            done
          fi

  # ── Job 2: Full E2E suite — runs only when smoke gate passes ─────────────────
  full-e2e:
    name: Full E2E Suite
    needs: smoke-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Skip if user requested smoke_only
    if: >
      needs.smoke-gate.result == 'success' &&
      github.event.inputs.smoke_only != 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run full cloud E2E suite
        id: e2e
        run: npx playwright test --config=playwright.cloud.config.ts $LIVE_CLOUD_E2E_SPECS --reporter=list,github,html,json
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results/results.json

      - name: Write E2E summary
        if: always()
        run: |
          echo "## Full E2E Suite Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          OUTCOME="${{ steps.e2e.outcome }}"
          if [ "$OUTCOME" = "success" ]; then
            echo "✅ All cloud E2E tests passed." >> $GITHUB_STEP_SUMMARY
          elif [ "$OUTCOME" = "failure" ]; then
            echo "⚠️ Some E2E tests failed — check the HTML report artifact below." >> $GITHUB_STEP_SUMMARY
          else
            echo "⏭️ E2E suite was skipped or cancelled." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Live-seeded validation is limited to health checks and cloud smoke specs; the broader cloud regression coverage runs in the separate Cloud E2E Regression workflow." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Trigger: \`${{ github.event_name }}\` | Branch: \`${{ github.event.workflow_run.head_branch || github.ref_name }}\` | SHA: \`${{ github.event.workflow_run.head_sha || github.sha }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload E2E HTML report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: cloud-e2e-report-${{ github.run_number }}
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload E2E JSON results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: cloud-e2e-results-json-${{ github.run_number }}
          path: frontend/test-results/results.json
          retention-days: 7

      # Notify Slack on failure — configure SLACK_WEBHOOK_URL as a repo secret
      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"❌ *HealthQ Copilot — Cloud E2E Tests FAILED* on \`${{ github.event.workflow_run.head_branch || github.ref_name }}\`\",
              \"attachments\": [{
                \"color\": \"danger\",
                \"fields\": [
                  {\"title\": \"Trigger\", \"value\": \"${{ github.event_name }}\", \"short\": true},
                  {\"title\": \"Commit\", \"value\": \"\`${{ github.event.workflow_run.head_sha || github.sha }}\`\", \"short\": true},
                  {\"title\": \"Run\", \"value\": \"<$RUN_URL|View report>\", \"short\": false}
                ]
              }]
            }"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ── Job 3: AI Triage — analyses failures and posts a plain-English summary ──
  # Uses GitHub Models (gpt-4o-mini) to read the Playwright JSON results and
  # produce actionable diagnosis: which MFEs failed, likely root causes, and
  # suggested fixes. Posts the analysis as a GitHub Step Summary.
  ai-triage:
    name: AI Failure Triage
    needs: [smoke-gate, full-e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: .
    # Always run so this job is never shown as "skipped"; triage mode is chosen at runtime.
    if: always()
    steps:
      - name: Determine triage mode
        run: |
          SMOKE_RESULT="${{ needs.smoke-gate.result }}"
          FULL_RESULT="${{ needs.full-e2e.result }}"

          echo "SMOKE_RESULT=$SMOKE_RESULT" >> "$GITHUB_ENV"
          echo "FULL_RESULT=$FULL_RESULT" >> "$GITHUB_ENV"

          if [ "$SMOKE_RESULT" = "failure" ]; then
            echo "TRIAGE_MODE=smoke-failure" >> "$GITHUB_ENV"
          elif [ "$FULL_RESULT" = "failure" ]; then
            echo "TRIAGE_MODE=full-failure" >> "$GITHUB_ENV"
          else
            echo "TRIAGE_MODE=none" >> "$GITHUB_ENV"
          fi

      - name: Download E2E JSON results
        if: env.TRIAGE_MODE == 'full-failure'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: cloud-e2e-results-json-${{ github.run_number }}
          path: ./results

      # Extract the failed test titles, error messages, and browser console errors
      # into a compact JSON blob that fits within the LLM context window.
      - name: Extract failures for AI context
        if: env.TRIAGE_MODE == 'full-failure'
        id: extract
        run: |
          python3 - <<'PYEOF'
          import json, os, sys

          results_path = "results/results.json"
          if not os.path.exists(results_path):
              print("No results.json found — skipping AI triage.")
              with open(os.environ["GITHUB_ENV"], "a") as env_file:
                env_file.write("HAS_RESULTS=false\n")
              sys.exit(0)

          with open(results_path) as f:
              data = json.load(f)

          failures = []
          for suite in data.get("suites", []):
              for spec in suite.get("specs", []):
                  for test in spec.get("tests", []):
                      for result in test.get("results", []):
                          if result.get("status") not in ("passed", "skipped"):
                              failures.append({
                                  "title": f"{suite.get('title', '')} > {spec.get('title', '')}",
                                  "status": result.get("status"),
                                  "error": result.get("error", {}).get("message", "")[:400],
                                  "duration_ms": result.get("duration"),
                              })

          summary = {
              "total_tests": data.get("stats", {}).get("expected", 0),
              "failed": len(failures),
              "failures": failures[:20],   # cap at 20 to stay within LLM token limit
          }

          payload = json.dumps(summary, indent=2)
          # Write as an env file variable (multi-line safe)
          with open(os.environ["GITHUB_ENV"], "a") as env_file:
              env_file.write("HAS_RESULTS=true\n")
              env_file.write(f"FAILURE_PAYLOAD<<EOF\n{payload}\nEOF\n")

          print(f"Extracted {len(failures)} failures.")
          PYEOF

      # Call GitHub Models API (free, no external key needed — uses GITHUB_TOKEN)
      - name: AI failure diagnosis
        if: env.TRIAGE_MODE == 'full-failure' && env.HAS_RESULTS == 'true'
        id: ai
        run: |
          SYSTEM_PROMPT="You are a senior QA engineer for HealthQ Copilot, a React 19 micro-frontend healthcare platform on Azure. Analyse the Playwright E2E test failures and produce a concise diagnosis (max 400 words) with: 1) Which MFE pages / backend APIs failed. 2) Likely root cause (e.g. API 404, field name mismatch, CSP violation, MFE not loaded). 3) Suggested fix per failure group. Use bullet points and be specific to the HealthQ platform."

          USER_MSG="Post-deploy Playwright results:\n\n$FAILURE_PAYLOAD"

          RESPONSE=$(curl -s -X POST \
            "https://models.inference.ai.azure.com/chat/completions" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg sys "$SYSTEM_PROMPT" \
              --arg usr "$USER_MSG" \
              '{model:"gpt-4o-mini",max_tokens:600,messages:[{role:"system",content:$sys},{role:"user",content:$usr}]}')" \
          )

          DIAGNOSIS=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "AI response unavailable."')
          echo "DIAGNOSIS<<EOF" >> "$GITHUB_ENV"
          echo "$DIAGNOSIS" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write AI triage to Step Summary
        if: always()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "## 🤖 AI Failure Triage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Run:** [#${{ github.run_number }}]($RUN_URL) | **Commit:** \`${{ github.event.workflow_run.head_sha || github.sha }}\` | **Trigger:** \`${{ github.event_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$TRIAGE_MODE" = "full-failure" ] && [ "$HAS_RESULTS" = "true" ]; then
            echo "$DIAGNOSIS" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "---" >> "$GITHUB_STEP_SUMMARY"
            echo "*Analysis generated by GitHub Models (gpt-4o-mini). Verify before acting.*" >> "$GITHUB_STEP_SUMMARY"
          elif [ "$TRIAGE_MODE" = "smoke-failure" ]; then
            echo "Smoke gate failed before the full suite could run, so no Playwright JSON artifact was available for model diagnosis." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Next actions:" >> "$GITHUB_STEP_SUMMARY"
            echo "- Inspect Smoke Gate logs for failing @smoke tests." >> "$GITHUB_STEP_SUMMARY"
            echo "- Check SWA warmup and endpoint status table in the smoke summary." >> "$GITHUB_STEP_SUMMARY"
            echo "- Re-run Cloud E2E after the smoke failure is fixed to enable full AI clustering." >> "$GITHUB_STEP_SUMMARY"
          elif [ "$TRIAGE_MODE" = "full-failure" ] && [ "$HAS_RESULTS" != "true" ]; then
            echo "Full E2E failed, but no results.json artifact was available for AI analysis." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No smoke/full E2E failures detected in this run. AI triage ran in monitoring mode." >> "$GITHUB_STEP_SUMMARY"
          fi
