name: Frontend MFE CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['frontend/**']
  pull_request:
    branches: [main]
    paths: ['frontend/**']

permissions:
  id-token: write
  contents: read

jobs:
  detect-mfe-changes:
    runs-on: ubuntu-latest
    outputs:
      shell: ${{ steps.filter.outputs.shell }}
      voice-mfe: ${{ steps.filter.outputs.voice-mfe }}
      triage-mfe: ${{ steps.filter.outputs.triage-mfe }}
      scheduling-mfe: ${{ steps.filter.outputs.scheduling-mfe }}
      pophealth-mfe: ${{ steps.filter.outputs.pophealth-mfe }}
      revenue-mfe: ${{ steps.filter.outputs.revenue-mfe }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shell:          ['frontend/apps/shell/**', 'frontend/packages/**']
            voice-mfe:      ['frontend/apps/voice-mfe/**', 'frontend/packages/**']
            triage-mfe:     ['frontend/apps/triage-mfe/**', 'frontend/packages/**']
            scheduling-mfe: ['frontend/apps/scheduling-mfe/**', 'frontend/packages/**']
            pophealth-mfe:  ['frontend/apps/pophealth-mfe/**', 'frontend/packages/**']
            revenue-mfe:    ['frontend/apps/revenue-mfe/**', 'frontend/packages/**']

  build-and-deploy:
    needs: detect-mfe-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: shell
            changed: ${{ needs.detect-mfe-changes.outputs.shell }}
            deploy_token_secret: SHELL_DEPLOY_TOKEN
          - app: voice-mfe
            changed: ${{ needs.detect-mfe-changes.outputs.voice-mfe }}
            deploy_token_secret: VOICE_MFE_DEPLOY_TOKEN
          - app: triage-mfe
            changed: ${{ needs.detect-mfe-changes.outputs.triage-mfe }}
            deploy_token_secret: TRIAGE_MFE_DEPLOY_TOKEN
          - app: scheduling-mfe
            changed: ${{ needs.detect-mfe-changes.outputs.scheduling-mfe }}
            deploy_token_secret: SCHEDULING_MFE_DEPLOY_TOKEN
          - app: pophealth-mfe
            changed: ${{ needs.detect-mfe-changes.outputs.pophealth-mfe }}
            deploy_token_secret: POPHEALTH_MFE_DEPLOY_TOKEN
          - app: revenue-mfe
            changed: ${{ needs.detect-mfe-changes.outputs.revenue-mfe }}
            deploy_token_secret: REVENUE_MFE_DEPLOY_TOKEN
    if: always()
    steps:
      - uses: actions/checkout@v4
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'

      - uses: pnpm/action-setup@v4
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        with:
          version: '9'

      - uses: actions/setup-node@v4
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: frontend
        run: pnpm --filter ${{ matrix.app }} lint

      - name: Type check
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: frontend
        run: pnpm --filter ${{ matrix.app }} type-check

      - name: Build
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: frontend
        run: pnpm --filter ${{ matrix.app }} build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL }}
          VOICE_MFE_URL: https://happy-smoke-0ba02780f.7.azurestaticapps.net/mf-manifest.json
          TRIAGE_MFE_URL: https://brave-hill-0d76ab10f.7.azurestaticapps.net/mf-manifest.json
          SCHEDULING_MFE_URL: https://yellow-smoke-0e7b6b70f.7.azurestaticapps.net/mf-manifest.json
          POPHEALTH_MFE_URL: https://orange-bay-00f28280f.7.azurestaticapps.net/mf-manifest.json
          REVENUE_MFE_URL: https://lemon-pond-067d2f40f.7.azurestaticapps.net/mf-manifest.json

      - name: Copy SWA config to dist
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          if [ -f "frontend/apps/${{ matrix.app }}/staticwebapp.config.json" ]; then
            cp frontend/apps/${{ matrix.app }}/staticwebapp.config.json frontend/apps/${{ matrix.app }}/dist/
          fi

      - name: Deploy to Azure Static Web Apps
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets[matrix.deploy_token_secret] }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/apps/${{ matrix.app }}/dist
          output_location: ''
          skip_app_build: true
