# Dapr pub/sub component for Azure Service Bus Topics
# Registered in ACA environment via: infra/scripts/setup-dapr.sh
# Auth: connection string stored as Dapr component secret (not Key Vault)
# Scopes use ACA container app names (not service names with -service suffix)
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub
  namespace: healthq-copilot
spec:
  type: pubsub.azure.servicebus.topics
  version: v1
  secretStore: ""
  secrets:
    - name: sb-connection-string
      value: "${SERVICEBUS_CONNECTION_STRING}"
  metadata:
    - name: connectionString
      secretRef: sb-connection-string
    - name: maxDeliveryCount
      value: "5"
    - name: deadLetterTopic
      value: "healthq-dlq"
scopes:
  - voice
  - ai-agent
  - fhir
  - ocr
  - scheduling
  - notification
  - pop-health
  - revenue
  - identity
