apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
  namespace: healthcare
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: "{REDIS_HOST}:6380"
    - name: redisPassword
      secretKeyRef:
        name: redis-password
        key: redis-password
    - name: enableTLS
      value: "true"
    - name: actorStateStore
      value: "true"
scopes:
  - scheduling-service
  - voice-service
