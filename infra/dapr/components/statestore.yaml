# OPTIONAL: Dapr state store backed by Azure Cache for Redis
# Not provisioned - no service currently calls GetStateAsync/SaveStateAsync.
# If needed in future: provision Azure Cache for Redis, then replace
# {REDIS_HOST} with the hostname and register via: infra/scripts/setup-dapr.sh
# Scopes corrected to ACA container app names (not -service suffix)
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
  namespace: healthq-copilot
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: "{REDIS_HOST}:6380"
    - name: redisPassword
      secretKeyRef:
        name: redis-password
        key: redis-password
    - name: enableTLS
      value: "true"
    - name: actorStateStore
      value: "true"
scopes:
  - scheduling
  - voice
