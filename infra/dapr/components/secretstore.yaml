# OPTIONAL: Dapr secret store backed by Azure Key Vault
# Not provisioned in current deployment - DaprSecretProvider in services
# is registered but only fails if GetSecretAsync() is called.
# To enable: provision an Azure Key Vault, assign the ACA managed identity
# Get-Secret permission, then replace {KEYVAULT_NAME} below and register
# this component via: infra/scripts/setup-dapr.sh
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: azure-keyvault
  namespace: healthq-copilot
spec:
  type: secretstores.azure.keyvault
  version: v1
  metadata:
    - name: vaultName
      value: "{KEYVAULT_NAME}"
    - name: azureClientId
      value: ""
