global:
  namespace: healthq-copilot
  registry: healthqcopilot.azurecr.io
  imagePullPolicy: Always
  env: production
  tenantId: "" # Set via values.production.yaml or --set global.tenantId=<tenant-id>

services:
  voice:
    name: voice-service
    port: 8080
    replicas: 2
    image:
      repository: healthq-copilot/voice
      tag: latest
    workloadIdentity:
      clientId: "" # Set via values.production.yaml: voice managed identity client ID
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    nodeSelector:
      workload: api
    env:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

  ai-agent:
    name: ai-agent-service
    port: 8080
    replicas: 2
    image:
      repository: healthq-copilot/ai-agent
      tag: latest
    workloadIdentity:
      clientId: "" # ai-agent managed identity client ID
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 2Gi
    nodeSelector:
      workload: ai
    tolerations:
      - key: workload
        value: ai
        effect: NoSchedule
    env:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

  fhir:
    name: fhir-service
    port: 8080
    replicas: 2
    image:
      repository: healthq-copilot/fhir
      tag: latest
    workloadIdentity:
      clientId: "" # fhir managed identity client ID
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    nodeSelector:
      workload: api
    env:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

  identity:
    name: identity-service
    port: 8080
    replicas: 2
    image:
      repository: healthq-copilot/identity
      tag: latest
    workloadIdentity:
      clientId: "" # identity managed identity client ID
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    nodeSelector:
      workload: api
    env:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

  ocr:
    name: ocr-service
    port: 8080
    replicas: 1
    image:
      repository: healthq-copilot/ocr
      tag: latest
    workloadIdentity:
      clientId: "" # ocr managed identity client ID
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 2Gi
    nodeSelector:
      workload: batch
    tolerations:
      - key: kubernetes.azure.com/scalesetpriority
        value: spot
        effect: NoSchedule
    env:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

  scheduling:
    name: scheduling-service
    port: 8080
    replicas: 2
    image:
      repository: healthq-copilot/scheduling
      tag: latest
    workloadIdentity:
      clientId: "" # scheduling managed identity client ID
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    nodeSelector:
      workload: api
    env:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

  notification:
    name: notification-service
    port: 8080
    replicas: 1
    image:
      repository: healthq-copilot/notification
      tag: latest
    workloadIdentity:
      clientId: "" # notification managed identity client ID
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    nodeSelector:
      workload: api
    env:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

  pophealth:
    name: pophealth-service
    port: 8080
    replicas: 1
    image:
      repository: healthq-copilot/pophealth
      tag: latest
    workloadIdentity:
      clientId: "" # pophealth managed identity client ID
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 2Gi
    nodeSelector:
      workload: batch
    tolerations:
      - key: kubernetes.azure.com/scalesetpriority
        value: spot
        effect: NoSchedule
    env:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

  revenue:
    name: revenue-service
    port: 8080
    replicas: 2
    image:
      repository: healthq-copilot/revenue
      tag: latest
    workloadIdentity:
      clientId: "" # revenue managed identity client ID
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    nodeSelector:
      workload: api
    env:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
