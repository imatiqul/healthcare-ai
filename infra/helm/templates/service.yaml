{{- range $key, $svc := .Values.services }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $svc.name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: {{ $svc.name }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: {{ $svc.port }}
      protocol: TCP
      name: http
  selector:
    app: {{ $svc.name }}
{{- end }}
