apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: ai-agent-service
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.services.ai-agent.replicas }}
  selector:
    matchLabels:
      app: ai-agent-service
  template:
    metadata:
      labels:
        app: ai-agent-service
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: ai-agent-service
        dapr.io/app-port: "8080"
    spec:
      serviceAccountName: ai-agent-service-sa
      nodeSelector:
        workload: ai
      tolerations:
        - key: workload
          value: ai
          effect: NoSchedule
      containers:
        - name: ai-agent-service
          image: {{ .Values.global.registry }}/{{ index .Values.services "ai-agent" "image" "repository" }}:{{ index .Values.services "ai-agent" "image" "tag" }}
          ports:
            - containerPort: 8080
          resources:
            {{- toYaml (index .Values.services "ai-agent" "resources") | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
  strategy:
    canary:
      steps:
        - setWeight: 10
        - pause: { duration: 5m }
        - analysis:
            templates:
              - templateName: hallucination-rate-check
              - templateName: api-success-rate
        - setWeight: 30
        - pause: { duration: 10m }
        - analysis:
            templates:
              - templateName: hallucination-rate-check
        - setWeight: 60
        - pause: { duration: 10m }
        - setWeight: 100
      canaryService: ai-agent-canary
      stableService: ai-agent-stable
      trafficRouting:
        nginx:
          stableIngress: ai-agent-ingress
