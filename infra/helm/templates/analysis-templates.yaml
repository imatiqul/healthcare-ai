apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: hallucination-rate-check
  namespace: {{ .Values.global.namespace }}
spec:
  metrics:
    - name: hallucination-rate
      interval: 60s
      successCondition: result[0] <= 0.05
      failureLimit: 2
      provider:
        prometheus:
          address: http://prometheus.monitoring:9090
          query: |
            sum(rate(agent_guard_verdict_total{verdict="unsafe",namespace="{{ .Values.global.namespace }}"}[5m]))
            /
            sum(rate(agent_guard_verdict_total{namespace="{{ .Values.global.namespace }}"}[5m]))
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: api-success-rate
  namespace: {{ .Values.global.namespace }}
spec:
  metrics:
    - name: success-rate
      interval: 60s
      successCondition: result[0] >= 0.99
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus.monitoring:9090
          query: |
            sum(rate(http_requests_total{namespace="{{ .Values.global.namespace }}",code=~"2.."}[5m]))
            /
            sum(rate(http_requests_total{namespace="{{ .Values.global.namespace }}"}[5m]))
