apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dapr-sidecar
  namespace: healthcare
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 3500
        - protocol: TCP
          port: 50001
        - protocol: TCP
          port: 9090
  egress:
    - ports:
        - protocol: TCP
          port: 3500
        - protocol: TCP
          port: 50001
