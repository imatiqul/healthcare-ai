# Argo Rollouts canary strategy for all 10 HealthQ Copilot microservices.
# Promotes from 20% → 40% → 60% → 100% with 2-minute pause between each step.
# A failed analysis at any step triggers automatic rollback.
#
# Usage:
#   kubectl apply -f infra/argocd/rollouts/
#
# Prerequisites:
#   - Argo Rollouts controller installed in the cluster
#   - Prometheus scraped at 'http://prometheus.monitoring.svc:9090'
#   - Each service exposes /metrics with 'http_server_requests_seconds_count' and
#     'http_server_requests_seconds_bucket' (OpenTelemetry .NET instrumentation)
---
# AnalysisTemplate shared by all rollouts
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: healthq-success-rate
  namespace: healthq-copilot
spec:
  args:
    - name: service-name
    - name: canary-hash
  metrics:
    - name: success-rate
      interval: 60s
      count: 3           # evaluate 3 times over 3 minutes before passing
      successCondition: result[0] >= 0.99
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus-operated.monitoring.svc:9090
          query: |
            sum(rate(http_server_requests_seconds_count{
              service="{{args.service-name}}",
              pod_template_hash="{{args.canary-hash}}",
              status!~"5.."
            }[2m]))
            /
            sum(rate(http_server_requests_seconds_count{
              service="{{args.service-name}}",
              pod_template_hash="{{args.canary-hash}}"
            }[2m]))
    - name: latency-p99
      interval: 60s
      count: 3
      successCondition: result[0] <= 1.0   # p99 ≤ 1 second
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus-operated.monitoring.svc:9090
          query: |
            histogram_quantile(0.99, sum(rate(
              http_server_requests_seconds_bucket{
                service="{{args.service-name}}",
                pod_template_hash="{{args.canary-hash}}"
              }[2m])) by (le))
---
# Rollout: agents
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: healthq-agents
  namespace: healthq-copilot
spec:
  replicas: 3
  selector:
    matchLabels:
      app: healthq-agents
  template:
    metadata:
      labels:
        app: healthq-agents
    spec:
      containers:
        - name: agents
          image: ghcr.io/imatiqul/azure-ai-cloud-healthcare/healthq-copilot-agents:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: healthq-secrets
  strategy:
    canary:
      canaryService: healthq-agents-canary
      stableService: healthq-agents-stable
      analysis:
        templates:
          - templateName: healthq-success-rate
        startingStep: 2
        args:
          - name: service-name
            value: healthq-agents
          - name: canary-hash
            valueFrom:
              podTemplateHashValue: Latest
      steps:
        - setWeight: 20
        - pause: { duration: 2m }
        - setWeight: 40
        - pause: { duration: 2m }
        - setWeight: 60
        - pause: { duration: 2m }
        - setWeight: 100
---
