apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: healthq-copilot
  namespace: argocd
spec:
  description: HealthQ Copilot microservices project
  sourceRepos:
    - https://github.com/your-org/healthq-copilot.git
  destinations:
    - namespace: healthq-copilot
      server: https://kubernetes.default.svc
    - namespace: healthq-copilot-dev
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
