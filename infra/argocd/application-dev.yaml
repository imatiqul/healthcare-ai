apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: healthcare-ai-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/healthcare-ai.git
    targetRevision: develop
    path: infra/helm
    helm:
      valueFiles:
        - values.yaml
        - values.dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: healthcare-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
